name: Code Reviewer
description: Cross-language AI code review for GitHub PRs — quality, security, and test coverage in a structured comment.

inputs:
  model:
    description: "OpenCode model to use. Format: provider/model-id."
    required: false
    default: "anthropic/claude-sonnet-4-5"
  anthropic_api_key:
    description: "Anthropic API key. Required if using an Anthropic model."
    required: false
  github_token:
    description: "GitHub token for posting review comments."
    required: true

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install call-graph dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev

    - name: Generate call graph
      id: call_graph
      shell: bash
      run: |
        # Get changed source files (Python, TypeScript, Rust only)
        CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")
        FILES=$(echo "$CHANGED" | grep -E '\.(py|ts|tsx|js|jsx|rs)$' | grep -v 'node_modules' || true)

        FALLBACK_MERMAID='graph TD\n    _empty["No supported source files changed"]'

        if [ -z "$FILES" ]; then
          {
            echo "mermaid<<MERMAID_EOF"
            printf '%b' "$FALLBACK_MERMAID"
            echo ""
            echo "MERMAID_EOF"
            echo "url="
          } >> $GITHUB_OUTPUT
          exit 0
        fi

        # Run the call-graph generator; stderr has the mermaid.live URL
        MERMAID=$(node ${{ github.action_path }}/src/call-graph.js $FILES 2>/tmp/cg_stderr || echo "")
        URL=$(grep 'mermaid.live:' /tmp/cg_stderr | sed 's/mermaid.live: //' || echo "")

        if [ -z "$MERMAID" ]; then
          MERMAID="$FALLBACK_MERMAID"
        fi

        # Write multiline mermaid + single-line url using heredoc syntax
        {
          echo "mermaid<<MERMAID_EOF"
          echo "$MERMAID"
          echo "MERMAID_EOF"
          echo "url=$URL"
        } >> $GITHUB_OUTPUT

        # Write the call graph to a file for the artifact upload
        mkdir -p /tmp/code-review-artifacts
        echo "$MERMAID" > /tmp/code-review-artifacts/call-graph.mmd
        echo "$URL" > /tmp/code-review-artifacts/call-graph-url.txt

    - uses: anomalyco/opencode/github@latest
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
      with:
        model: ${{ inputs.model }}
        use_github_token: true
        prompt: |
          You are a senior code reviewer. Review this pull request thoroughly and
          maintain a single up-to-date review comment — do not post multiple comments.

          ---

          ## STEP 1: Find or create the review comment (do this first)

          This reviewer runs on every push. You must maintain ONE comment per PR,
          updating it in place rather than posting a new one each time.

          Run this command to find an existing review comment:

          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | contains("<!-- code-reviewer:summary -->")) | .id'

          - If it returns a comment ID: you will PATCH that comment at the end.
          - If it returns nothing: you will POST a new comment at the end.

          Do NOT post or edit anything yet. Just note the ID (or absence of one).

          ---

          ## STEP 2: Load project standards

          Check for project-specific review standards in this repo:

          1. Read `AGENTS.md` if it exists. Look for a `## Review Standards` section
             and apply any instructions there throughout your review. These are
             project-specific conventions, focus areas, and rules that override or
             supplement the defaults below.

          2. Read `.review/standards.yml` if it exists. Respect any configured
             `ignore_paths` (skip those files entirely), `boilerplate_patterns`
             (collapse those into the boilerplate section), `acceptance_criteria_source`
             (use that source instead of the PR body), and `smell_severity` overrides
             (adjust your reporting threshold accordingly).

          If neither file exists, proceed with the defaults below.

          ---

          ## STEP 3: Compose the review

          Write the complete review body using this exact format. The comment body
          MUST start with the hidden marker on the very first line — this is how the
          next run finds and updates it.

          <!-- code-reviewer:summary -->
          _Last reviewed: commit `${{ github.event.pull_request.head.sha }}` · ${{ github.event.pull_request.updated_at }}_

          ---

          ## 📋 PR Summary

          Restate the PR's stated goal in one sentence (from the PR title and body).
          Then list the acceptance criteria or key goals as bullet points, drawn
          directly from the PR body or linked issue. If none are stated, note that.

          ---

          ## 📁 Files Changed

          | File | Category | Notes |
          |------|----------|-------|

          Categorize each changed file as one of: `logic`, `test`, `config`,
          `boilerplate`, `docs`. In Notes, one-line description of what changed.
          Order: logic first, then test, then config, boilerplate, docs last.

          ---

          ## 📊 Call Graph

          > 🔍 [Open full interactive diagram on mermaid.live](${{ steps.call_graph.outputs.url }})

          ```mermaid
          ${{ steps.call_graph.outputs.mermaid }}
          ```

          ---

          ## 🔍 Quality Findings

          | Severity | File:Line | Finding |
          |----------|-----------|---------|

          Severity levels: `🔴 high`, `🟡 medium`, `🔵 low`.
          Include: code smells, design issues, missing error handling, potential bugs,
          duplication, unclear naming. Be specific — reference the exact file and line
          number as `path/to/file.py:42` (GitHub auto-links these to the diff).
          Omit this section if there are no findings.

          ---

          ## 🔒 Security Findings

          | Severity | File:Line | Finding |
          |----------|-----------|---------|

          Flag: hardcoded secrets/credentials, injection vulnerabilities, unsafe
          deserialization, weak crypto, path traversal, missing authorization checks,
          SSRF. Reference exact `file:line`. Be specific about the pattern and why it
          is risky. Omit this section entirely if there are no security concerns.

          ---

          ## 🧪 Test Coverage

          For each logic file changed, identify its corresponding test file (if any).
          Quote the key test cases alongside the implementation they cover:

          <details>
          <summary><code>path/to/impl.py</code> ↔ <code>path/to/test_impl.py</code></summary>

          **Implementation (the key change):**
          ```language
          // relevant changed code
          ```

          **Tests covering it:**
          ```language
          // relevant test cases
          ```

          </details>

          If a logic file has no corresponding test file, flag it as `⚠️ No tests found`.
          Omit this section if there are no logic files changed.

          ---

          ## 📦 Boilerplate & Generated Files

          <details>
          <summary>Collapse boilerplate files (click to expand)</summary>

          List any files categorized as boilerplate or generated, with a one-line
          summary of what changed. Reviewers can skip these unless something looks off.

          </details>

          Omit this section if there are no boilerplate files.

          ---

          ## ✅ Summary

          2-3 sentences: overall assessment, the most important finding (if any),
          and whether this PR looks ready to merge or needs changes.

          ---

          ## STEP 4: Post or update the comment

          Write the complete review body to a temp file, then:

          If you found an existing comment ID in STEP 1:
            gh api --method PATCH \
              repos/${{ github.repository }}/issues/comments/<ID> \
              -F body=@/tmp/review-body.md

          If no existing comment was found:
            gh api --method POST \
              repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              -F body=@/tmp/review-body.md

          Do NOT post inline line-anchored comments. All findings live in the tables
          above with file:line references.

    - name: Prepare review artifacts
      if: always()
      shell: bash
      run: |
        mkdir -p /tmp/code-review-artifacts
        # Write a README so the artifact is self-explanatory when downloaded
        cat > /tmp/code-review-artifacts/README.md << 'EOF'
        # Code Review Artifacts

        Generated by stephengolub/code-reviewer

        ## Files

        - `call-graph.mmd` — Mermaid source for the call graph
        - `call-graph-url.txt` — mermaid.live URL to view the diagram interactively

        ## View the call graph

        Open the URL in `call-graph-url.txt` in any browser.
        Or paste the contents of `call-graph.mmd` into https://mermaid.live
        EOF

        # Record run metadata
        echo "PR: ${{ github.event.pull_request.number }}" >> /tmp/code-review-artifacts/README.md
        echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> /tmp/code-review-artifacts/README.md

    - name: Upload review artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-review-pr-${{ github.event.pull_request.number }}
        path: /tmp/code-review-artifacts/
        retention-days: 90
        if-no-files-found: ignore
