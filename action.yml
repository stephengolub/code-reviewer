name: Code Reviewer
description: Cross-language AI code review for GitHub PRs — quality, security, and test coverage in a structured comment.

inputs:
  model:
    description: >
      OpenCode model to use. Format: provider/model-id.
      See https://opencode.ai/docs/providers for all supported providers and model IDs.
    required: false
    default: "anthropic/claude-sonnet-4-5"
  api_key:
    description: >
      API key for your chosen model provider. Use api_key_env_var to specify which
      environment variable OpenCode should read it from (default: ANTHROPIC_API_KEY).
      For a full list of provider env var names see https://opencode.ai/docs/providers.
    required: false
  api_key_env_var:
    description: >
      The environment variable name OpenCode uses to read the API key.
      Defaults to ANTHROPIC_API_KEY. Set this when using a non-Anthropic provider,
      e.g. OPENAI_API_KEY, GOOGLE_GENERATIVE_AI_API_KEY, GROQ_API_KEY.
      See https://opencode.ai/docs/providers for the correct name per provider.
    required: false
    default: "ANTHROPIC_API_KEY"
  anthropic_api_key:
    description: >
      Anthropic API key. Shorthand for api_key + api_key_env_var=ANTHROPIC_API_KEY.
      Kept for backward compatibility — prefer api_key + api_key_env_var for new setups.
    required: false
  github_token:
    description: "GitHub token for posting review comments."
    required: true

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install call-graph dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --omit=dev

    - name: Generate call graph
      id: call_graph
      shell: bash
      run: |
        # Get changed source files (Python, TypeScript, Rust only)
        CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")
        FILES=$(echo "$CHANGED" | grep -E '\.(py|ts|tsx|js|jsx|rs)$' | grep -v 'node_modules' || true)

        FALLBACK_MERMAID='graph TD\n    _empty["No supported source files changed"]'

        if [ -z "$FILES" ]; then
          {
            echo "mermaid<<MERMAID_EOF"
            printf '%b' "$FALLBACK_MERMAID"
            echo ""
            echo "MERMAID_EOF"
            echo "url="
          } >> $GITHUB_OUTPUT
          exit 0
        fi

        # Run the call-graph generator; stderr has the mermaid.live URL
        MERMAID=$(node ${{ github.action_path }}/src/call-graph.js $FILES 2>/tmp/cg_stderr || echo "")
        URL=$(grep 'mermaid.live:' /tmp/cg_stderr | sed 's/mermaid.live: //' || echo "")

        if [ -z "$MERMAID" ]; then
          MERMAID="$FALLBACK_MERMAID"
        fi

        # Write multiline mermaid + single-line url using heredoc syntax
        {
          echo "mermaid<<MERMAID_EOF"
          echo "$MERMAID"
          echo "MERMAID_EOF"
          echo "url=$URL"
        } >> $GITHUB_OUTPUT

        # Write the call graph to a file for the artifact upload
        mkdir -p /tmp/code-review-artifacts
        echo "$MERMAID" > /tmp/code-review-artifacts/call-graph.mmd
        echo "$URL" > /tmp/code-review-artifacts/call-graph-url.txt

    - name: Set provider API key
      shell: bash
      run: |
        # anthropic_api_key is the legacy shorthand — use it if set, otherwise
        # fall back to the generic api_key input under its declared env var name.
        if [ -n "${{ inputs.anthropic_api_key }}" ]; then
          echo "ANTHROPIC_API_KEY=${{ inputs.anthropic_api_key }}" >> $GITHUB_ENV
        elif [ -n "${{ inputs.api_key }}" ]; then
          echo "${{ inputs.api_key_env_var }}=${{ inputs.api_key }}" >> $GITHUB_ENV
        fi

    - name: Configure OpenCode permissions and harden git
      shell: bash
      run: |
        # Grant OpenCode permission to write to /tmp without interactive approval.
        cat > opencode.json << 'EOF'
        {
          "$schema": "https://opencode.ai/config.json",
          "permission": {
            "external_directory": {
              "/tmp/**": "allow"
            },
            "bash": {
              "*": "allow",
              "git commit *": "deny",
              "git push *": "deny",
              "git tag *": "deny"
            }
          }
        }
        EOF

        # Set git identity so commit attempts don't fail with "Author identity unknown"
        # (exit 128). With identity set, the commit may succeed but push will be
        # blocked by the repo's contents:read permission.
        git config --global user.email "opencode-review[bot]@users.noreply.github.com"
        git config --global user.name "opencode-review[bot]"

        # Make .git read-only so git write operations physically cannot succeed.
        # This is the most reliable way to prevent OpenCode from committing — it
        # bypasses any prompt/config that might not be respected.
        chmod -R a-w .git

    - uses: anomalyco/opencode/github@latest
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      with:
        model: ${{ inputs.model }}
        use_github_token: true
        prompt: |
          You are a code comprehension assistant helping a human reviewer understand
          this pull request. Your job is to make the change readable, not to gate it.
          Surface the structure, flag things worth a closer look, and let the reviewer
          decide what matters. Post advisory notes, not verdicts. Maintain a single
          up-to-date comment — do not post multiple comments.

          ---

          ## STEP 1: Find or create the comprehension comment (do this first)

          This reviewer runs on every push. You must maintain ONE comment per PR,
          updating it in place rather than posting a new one each time.

          Run this command to find an existing review comment:

          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | contains("<!-- code-reviewer:summary -->")) | .id'

          - If it returns a comment ID: you will PATCH that comment at the end.
          - If it returns nothing: you will POST a new comment at the end.

          Do NOT post or edit anything yet. Just note the ID (or absence of one).

          ---

          ## STEP 2: Load project standards

          Check for project-specific review standards in this repo:

          1. Read `AGENTS.md` if it exists. Look for a `## Review Standards` section
             and apply any instructions there throughout your review. These are
             project-specific conventions, focus areas, and rules that override or
             supplement the defaults below.

          2. Read `.review/standards.yml` if it exists. Respect any configured
             `ignore_paths` (skip those files entirely), `boilerplate_patterns`
             (collapse those into the boilerplate section), `acceptance_criteria_source`
             (use that source instead of the PR body), and `smell_severity` overrides
             (adjust your reporting threshold accordingly).

          If neither file exists, proceed with the defaults below.

          ---

          ## STEP 3: Compose the comprehension comment

          Write the complete comment body using this format. The comment body MUST start
          with the hidden marker on the very first line — this is how the next run finds
          and updates it.

          <!-- code-reviewer:summary -->
          _Last reviewed: commit `${{ github.event.pull_request.head.sha }}` · ${{ github.event.pull_request.updated_at }}_

          ---

          ## 📊 Call Graph

          Start here. The call graph shows the *shape* of the change — how the modified
          functions relate to each other — before the reviewer reads a single line.

          > 🔍 [Open full interactive diagram on mermaid.live](${{ steps.call_graph.outputs.url }})

          ```mermaid
          ${{ steps.call_graph.outputs.mermaid }}
          ```

          ---

          ## 📋 What changed

          One sentence: what this change does, in plain language (from the PR title and
          body). Then the stated goals or acceptance criteria as bullet points. If none
          are stated, note that.

          ---

          ## 📁 Files

          | File | Category | What changed |
          |------|----------|--------------|

          Categorize each file as: `logic`, `test`, `config`, `boilerplate`, `docs`.
          Order: logic first, then test, then config, boilerplate, docs last.

          ---

          ## 🧪 Tests

          For each logic file changed, show its test file alongside it so the reviewer
          doesn't have to hunt:

          <details>
          <summary><code>path/to/impl.py</code> ↔ <code>path/to/test_impl.py</code></summary>

          **The key change:**
          ```language
          // relevant changed code
          ```

          **Tests covering it:**
          ```language
          // relevant test cases
          ```

          </details>

          If a logic file has no test file, note it: `⚠️ No tests found`.
          Omit this section if no logic files changed.

          ---

          ## 📦 Boilerplate

          <details>
          <summary>Generated and boilerplate files (click to expand)</summary>

          One-line summary per file. Reviewers can skip these unless something looks off.

          </details>

          Omit if no boilerplate files.

          ---

          ## 👀 Worth a look

          Things a reviewer might want to check — framed as advisory notes, not verdicts.
          The reviewer decides what matters. Use "worth checking…", "I'd look at…",
          "might be worth…" — never "this is wrong" or "must fix".

          | Priority | File:Line | Note |
          |----------|-----------|------|

          Priority levels: `🔴 look at this` (security or likely bug), `🟡 worth checking`
          (smell, edge case, test gap), `🔵 minor` (naming, style, duplication).

          For security concerns — hardcoded secrets, injection patterns, weak crypto,
          path traversal, missing authorization — always include them at `🔴` and explain
          *why* it's worth a look and what the reviewer should verify. The reviewer judges;
          flag it so they can't accidentally miss it.

          Omit this section if there is nothing worth flagging.

          ---

          ## 💬 Read this as

          2-3 sentences: what kind of change this is, what the reviewer's attention
          should focus on, and anything that would help them read it faster. No
          pass/fail judgment. No "ready to merge" verdict — that's the reviewer's call.

          ---

          ## STEP 4: Post or update the comment

          Write the complete review body to a temp file, then:

          If you found an existing comment ID in STEP 1:
            gh api --method PATCH \
              repos/${{ github.repository }}/issues/comments/<ID> \
              -F body=@/tmp/review-body.md

          If no existing comment was found:
            gh api --method POST \
              repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              -F body=@/tmp/review-body.md

          Do NOT post inline line-anchored comments. All findings live in the tables
          above with file:line references.

          IMPORTANT: Do NOT run git commit, git push, git tag, or any git write
          command under any circumstances. The repository is read-only for this job.
          Your one and only output is the single PR comment posted via gh api above.
          The job is complete the moment that comment is posted. Stop.

    - name: Prepare review artifacts
      if: always()
      shell: bash
      run: |
        mkdir -p /tmp/code-review-artifacts
        # Write a README so the artifact is self-explanatory when downloaded
        cat > /tmp/code-review-artifacts/README.md << 'EOF'
        # Code Review Artifacts

        Generated by stephengolub/code-reviewer

        ## Files

        - `call-graph.mmd` — Mermaid source for the call graph
        - `call-graph-url.txt` — mermaid.live URL to view the diagram interactively

        ## View the call graph

        Open the URL in `call-graph-url.txt` in any browser.
        Or paste the contents of `call-graph.mmd` into https://mermaid.live
        EOF

        # Record run metadata
        echo "PR: ${{ github.event.pull_request.number }}" >> /tmp/code-review-artifacts/README.md
        echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> /tmp/code-review-artifacts/README.md

    - name: Upload review artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: code-review-pr-${{ github.event.pull_request.number }}
        path: /tmp/code-review-artifacts/
        retention-days: 90
        if-no-files-found: ignore
